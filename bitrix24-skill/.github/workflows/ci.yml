name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff==0.15.16

      - name: Lint
        run: ruff check skills tests tools

      - name: Coverage (informational)
        continue-on-error: true
        run: |
          pip install 'coverage<8'
          coverage run -m unittest discover -s tests
          coverage report -m --include='*/skills/bitrix24-agent/scripts/*'

  verify-catalogs:
    # Anti-drift gate: catalog methods must exist in the official API (unknown -> fail).
    # Docs-deprecated methods are reported as warnings (kept intentionally with markers).
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify catalogs against pinned API metadata
        run: python3 tools/verify_catalogs.py

      - name: bundled maps are in sync with catalogs/dataset
        run: |
          python3 tools/gen_required_params.py
          python3 tools/gen_method_risk.py
          git diff --exit-code skills/bitrix24-agent/scripts/required_params.json skills/bitrix24-agent/scripts/method_risk.json

      - name: Report lean-load token footprint (informational)
        run: python3 tools/token_report.py

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Syntax check
        run: python -m compileall -q skills/bitrix24-agent/scripts

      - name: Unit tests
        run: python -m unittest discover -s tests -v
